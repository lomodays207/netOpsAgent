<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>netOpsAgent - AI 诊断助手</title>
    <link rel="stylesheet" href="/static/style.css?v=2.4">
</head>

<body>
    <div class="chat-container">
        <header class="chat-header">
            <h1>🤖 AI 网络访问关系智能助手</h1>
            <p class="subtitle">智能对话式故障排查</p>
        </header>

        <main class="chat-main">
            <!-- 消息列表 -->
            <div class="messages-container" id="messages-container"></div>

            <!-- 输入区域 -->
            <div class="input-container">
                <form id="chat-form">
                    <div class="input-wrapper">
                        <textarea id="user-input" placeholder="请描述你的诉求，例如某访问不通排查、某系统访问关系查询、访问开通流程或提单材料咨询" rows="1" autofocus></textarea>
                        <button type="submit" id="send-btn" class="send-btn">
                            <span class="send-icon">▶</span>
                        </button>
                        <button type="button" id="stop-btn" class="stop-btn" title="停止生成">
                            <span class="send-icon">⏹</span>
                        </button>
                    </div>
                    <div class="input-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="use-llm" checked>
                            <span>使用 LLM 智能解析</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="use-rag" checked>
                            <span>启用知识库检索</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="verbose">
                            <span>详细模式</span>
                        </label>
                    </div>
                </form>
            </div>
        </main>

        <footer class="chat-footer">
            <p>netOpsAgent v2.0 | <a href="/docs" target="_blank">API 文档</a> | <a href="/static/history.html">📚
                    聊天记录</a> | <a href="/static/knowledge.html">📖 知识库管理</a> | <a href="/static/access_assets.html">🔗 访问关系资产库</a></p>
        </footer>
    </div>

    <template id="welcome-message-template">
        <div class="message assistant-message welcome-message">
            <div class="message-avatar">🤖</div>
            <div class="message-content">
                <div class="message-text">
                    你好！我是 AI 网络访问关系智能助手。请描述你的诉求，例如某访问不通排查、某系统访问关系查询、访问开通流程或提单材料咨询。
                    <br><br>
                    例如：<code>10.0.1.10到10.0.2.20端口80不通</code>
                </div>
            </div>
        </div>
    </template>

    <template id="quick-prompts-template">
        <section class="quick-prompts-section" id="quick-prompts-section">
            <div class="quick-prompts-header">
                <h2 class="quick-prompts-title">猜你想问</h2>
                <p class="quick-prompts-subtitle">点击即可填入输入框，可继续补充具体 IP、端口、系统名称</p>
            </div>
            <div class="quick-prompt-groups"></div>
        </section>
    </template>

    <template id="quick-prompt-card-template">
        <button type="button" class="quick-prompt-card">
            <span class="quick-prompt-card-title"></span>
            <span class="quick-prompt-card-description"></span>
        </button>
    </template>

    <!-- 加载指示器模板 -->
    <template id="loading-template">
        <div class="message assistant-message">
            <div class="message-avatar">🤖</div>
            <div class="message-content">
                <div class="message-text">
                    <div class="typing-indicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- 工具调用模板 -->
    <template id="tool-call-template">
        <div class="tool-call-card collapsed">
            <div class="tool-header">
                <span class="tool-collapse-icon">▼</span>
                <span class="tool-icon">🔧</span>
                <span class="tool-name"></span>
                <span class="tool-time"></span>
                <span class="tool-status-icon"></span>
            </div>
            <div class="tool-details">
                <div class="tool-detail-label">参数 [Arguments]</div>
                <div class="tool-arguments"></div>
                <div class="tool-detail-label">结果 [Result]</div>
                <div class="tool-result"></div>
                <div class="tool-actions" hidden></div>
            </div>
        </div>
    </template>

    <!-- 问题询问模板 -->
    <template id="question-template">
        <div class="message assistant-message">
            <div class="message-avatar">🤖</div>
            <div class="message-content">
                <div class="message-text question-message">
                    <div class="question-icon">❓</div>
                    <div class="question-text"></div>
                </div>
            </div>
        </div>
    </template>

    <!-- 最终报告模板 -->
    <template id="report-template">
        <div class="final-report-card">
            <h3>📋 诊断报告</h3>
            <div class="report-item">
                <strong>根因分析：</strong>
                <p class="root-cause"></p>
            </div>
            <div class="report-item">
                <strong>置信度：</strong>
                <p class="confidence"></p>
            </div>
            <div class="report-item">
                <strong>修复建议：</strong>
                <ul class="suggestions"></ul>
            </div>
        </div>
    </template>

    <!-- 证据来源面板模板 -->
    <template id="evidence-sources-template">
        <div class="evidence-sources-panel">
            <div class="evidence-header">
                <span class="evidence-icon">📚</span>
                <span class="evidence-title">知识来源</span>
                <span class="evidence-count"></span>
            </div>
            <div class="evidence-list"></div>
        </div>
    </template>

    <!-- 证据卡片模板 -->
    <template id="evidence-card-template">
        <div class="evidence-card" data-doc-id="">
            <div class="evidence-card-header">
                <span class="evidence-filename"></span>
                <span class="evidence-score-badge"></span>
            </div>
            <div class="evidence-score-bar">
                <div class="evidence-score-fill"></div>
            </div>
            <div class="evidence-preview"></div>
        </div>
    </template>

    <!-- 文档预览模态框模板 -->
    <template id="document-preview-modal-template">
        <div class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title"></h3>
                    <button class="modal-close-btn" aria-label="关闭">✕</button>
                </div>
                <div class="modal-body">
                    <div class="modal-loading">
                        <div class="typing-indicator">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                        <p>加载中...</p>
                    </div>
                    <div class="modal-content-text"></div>
                    <div class="modal-error"></div>
                </div>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js?v=2.4"></script>
</body>

</html>
